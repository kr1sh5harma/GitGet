<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a" rx="20"/>
  
  <!-- Lens/Diamond shape with GitHub fork elements -->
  <g transform="translate(50, 50)">
    <!-- Outer lens circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
    
    <!-- Inner diamond/lens -->
    <path d="M 0 -20 L 15 0 L 0 20 L -15 0 Z" fill="white" opacity="0.9"/>
    
    <!-- Fork lines (dots) -->
    <circle cx="-8" cy="-12" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="8" cy="-12" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="0" cy="16" r="2.5" fill="white" opacity="0.7"/>
  </g>
</svg>